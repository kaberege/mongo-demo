services:
  nodejs-demo:
    build: .
    container_name: nodejs-demo
    ports:
      - 8000:8000
    env_file:
      - .env
    depends_on:
      mongocont:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
  mongocont:
    image: mongo:4
    container_name: mongocont
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:${MONGO_PORT}"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongo",
          "--username",
          "${MONGO_USER}",
          "--password",
          "${MONGO_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  mongo-data:
